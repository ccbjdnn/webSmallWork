<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
		<style>
			.box {
			    width: 200px; /* 宽 */
			    height: 200px; /* 高 */
			    border: 10px solid black; /* 黑边框，宽度 10px */
			    padding: 20px; /* 内边距，使文字距离内边框 20px */
			    background-color: blue; /* 背景颜色为蓝色 */
			    box-sizing: border-box; /* 让 width 和 height 包含边框和内边距 */
			}
		</style>
	</head>
	<body>
		 <div class="box">盒子里面的内容，距离边框有一定的距离</div>
	</body>
</html>
