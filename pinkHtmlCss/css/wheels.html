<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bjWheels</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .box {
      height: 128px;
      width: calc(128px* 11);
      border: 1px solid #000;
      background-color: rgba(0, 0, 0, .2);
    }

    .box img {
      height: 100%;
      width: 128px;
      transition: all 3s;
    }

    .box:hover img {
      /* 平移旋转 */
      transform: translateX(calc(128px* 10)) rotate(1800deg);
    }

    .card {
      height: 128px;
      width: 128px;
      background-color: rgba(0, 0, 0, .2);
      border: 1px solid #000;
      margin: 50px auto;
      transition: all 1s;
      /* infinite 无限循环 */
      animation: move 3s;
    }

    .card:hover {
      transform: perspective(500px) rotateY(360deg) scale(1.1);
    }

    .card img {
      height: 100%;
      width: 128px;
      transition: all 1s;
    }

    @keyframes move {
      0% {
        transform: translate3d(0, 0, 0);
      }

      33.3% {
        transform: translate3d(200px, 0, 0);
      }

      66.6% {
        transform: translate3d(0, 200px, 0);
      }

      100% {
        transform: translate3d(0, 0, 0);
      }
    }
  </style>
</head>

<body>
  <div class="box">
    <img src="../../img/小logo.png" alt="">
  </div>
  <div class="card">
    <img src="../../img/小logo.png" alt="">
  </div>
</body>

</html>
