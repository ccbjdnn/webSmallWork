<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ciallo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    a {
      text-decoration: none;
      color: #000;
      font-size: 24px;
      font-weight: 400;
    }

    body {
      background-color: #f5f5f5;
    }

    .card {
      width: 234px;
      height: 300px;
      background-color: #fff;
      margin: 50px auto;
      text-align: center;
      transition: all 0.5s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      /* transform: translate(50%, 10px); */
      /* 卡片向上移动 */
      transform: translateY(-10px);
    }

    .card:hover .add {
      transform: translateY(-100px);
      /* transition: all 0.3s; */
    }

    .card:hover img {
      transform: scale(1.1);
      /* transition: all 0.3s; */
    }

    img {
      width: 160px;
      margin-top: 20px;
      transition: all 0.3s;

    }

    .title {
      margin-top: 20px;
      font-size: 14px;
      font-weight: 400;
    }

    .desc {
      font-size: 12px;
      font-weight: 400;
      padding: 0 15px;
      color: #b0b0b0;
      /* -----单行文本移除省略号----- */
      /* 超出部分隐藏 */
      overflow: hidden;
      /* 文字超出部分用省略号表示 */
      text-overflow: ellipsis;
      /* 不换行 */
      white-space: nowrap;
    }

    .price {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      font-weight: bold;
    }

    del {
      color: #b0b0b0;
    }

    span {
      color: #ff6700;
    }

    .add {
      background-color: rgba(0, 0, 0, .2);
      position: absolute;
      width: 100%;
      height: 100px;
      line-height: 100px;
      bottom: -100px;
      transition: all 0.3s;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="../../img/小logo.png" alt="">
    <h3 class="title">CCBJ</h3>
    <p class="desc">ciallo|ciallo|ciallo|ciallo|ciallo|ciallo|ciallo|ciallo</p>
    <p class="price">
      <span>¥2999&nbsp;</span>
      <del>$1999</del>
    </p>
    <div class="add"><a href="https://space.bilibili.com/88114478?spm_id_from=333.788.0.0">加入购物车</a></div>
  </div>
</body>

</html>
