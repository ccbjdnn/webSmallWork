<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bj</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-around;
      align-items: filex-start;
    }

    li {
      width: 200px;
      height: 200px;
      background-color: blueviolet;
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      width: 60%;
      margin: 0 auto;
      gap: 10px;
    }

    .on {
      display: flex;
      gap: 10px;
      flex: 1;
      min-height: 200px;
    }

    .center {
      display: flex;
      gap: 10px;
      flex: 1;
      min-height: 200px;
    }

    .under {
      flex: 2;
    }

    .box1 {
      background-color: pink;
      flex: 2;
    }

    .box2 {
      background-color: yellow;
      flex: 1;
    }

    .box3 {
      background-color: red;
      flex: 1;
    }

    .box4 {
      background-color: blue;
      flex: 2;
    }

    .box5 {
      background-color: green;
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="on">
      <div class="box1"></div>
      <div class="box2"></div>
    </div>

    <div class="center">
      <div class="box3"></div>
      <div class="box4"></div>
      <div class="box5"></div>
    </div>

    <div class="under">
      <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </div>
  </div>
</body>

</html>
