<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>验证码验证页面</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- 配置Tailwind自定义颜色和字体 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#64748b',
            accent: '#f97316',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .captcha-bg {
        background-color: #f0f0f0;
      }
      .captcha干扰线 {
        stroke: rgba(0, 0, 0, 0.2);
        stroke-width: 1;
      }
      .card-shadow {
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- 卡片容器 -->
    <div class="bg-white rounded-xl p-6 md:p-8 card-shadow transition-all duration-300 hover:shadow-lg">
      <div class="text-center mb-6">
        <h2 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-gray-800">验证码验证</h2>
        <p class="text-gray-500 mt-2">请输入下方显示的验证码</p>
      </div>
      
      <!-- 验证码区域 -->
      <div class="mb-6 relative">
        <div class="flex items-center justify-between bg-gray-100 p-4 rounded-lg">
          <!-- 验证码画布 -->
          <canvas id="captchaCanvas" class="captcha-bg rounded-md w-56 h-20"></canvas>
          
          <!-- 刷新按钮 -->
          <button id="refreshCaptcha" class="text-secondary hover:text-primary transition-colors duration-200 flex items-center">
            <i class="fa fa-refresh mr-2"></i>
            <span class="hidden sm:inline">看不清换一张</span>
          </button>
        </div>
      </div>
      
      <!-- 输入区域 -->
      <div class="mb-6">
        <label for="captchaInput" class="block text-sm font-medium text-gray-700 mb-1">验证码:</label>
        <div class="flex">
          <input 
            type="text" 
            id="captchaInput" 
            class="flex-1 px-4 py-2 border border-gray-300 rounded-l-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
            placeholder="请输入验证码"
            autocomplete="off"
          >
          <button 
            id="submitBtn" 
            class="bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-r-lg font-medium transition-all duration-200 focus:ring-2 focus:ring-primary/50 focus:outline-none"
          >
            确定
          </button>
        </div>
        <p id="message" class="mt-2 text-sm hidden"></p>
      </div>
      
      <div class="text-center text-gray-500 text-sm">
        <p>输入正确的验证码后将跳转到下一页面</p>
      </div>
    </div>
  </div>

  <script>
    // 获取DOM元素
    const canvas = document.getElementById('captchaCanvas');
    const ctx = canvas.getContext('2d');
    const refreshBtn = document.getElementById('refreshCaptcha');
    const captchaInput = document.getElementById('captchaInput');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    
    // 验证码字符集（去掉易混淆的字符：0和O，1和l）
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    let captchaText = '';
    
    // 生成随机验证码
    function generateCaptcha() {
      captchaText = '';
      // 生成6位随机字符
      for (let i = 0; i < 6; i++) {
        const randomIndex = Math.floor(Math.random() * chars.length);
        captchaText += chars[randomIndex];
      }
      drawCaptcha();
    }
    
    // 绘制验证码到画布
    function drawCaptcha() {
      // 清空画布
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 设置画布尺寸
      canvas.width = 224;  // 对应w-56 (56*4=224)
      canvas.height = 80;  // 对应h-20 (20*4=80)
      
      // 绘制背景
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制干扰线
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.strokeStyle = `rgba(${Math.random() * 100}, ${Math.random() * 100}, ${Math.random() * 150}, 0.5)`;
        ctx.lineWidth = Math.random() * 2 + 1;
        ctx.stroke();
      }
      
      // 绘制干扰点
      for (let i = 0; i < 100; i++) {
        ctx.beginPath();
        ctx.arc(
          Math.random() * canvas.width, 
          Math.random() * canvas.height, 
          Math.random() * 1.5, 
          0, 
          Math.PI * 2
        );
        ctx.fillStyle = `rgba(${Math.random() * 100}, ${Math.random() * 100}, ${Math.random() * 150}, 0.3)`;
        ctx.fill();
      }
      
      // 绘制验证码文字
      ctx.font = 'bold 32px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      // 每个字符单独处理，增加随机性
      for (let i = 0; i < captchaText.length; i++) {
        // 随机颜色
        const hue = Math.floor(Math.random() * 60) + 0; // 红色到黄色之间
        ctx.fillStyle = `hsl(${hue}, 80%, 50%)`;
        
        // 随机旋转角度
        const rotate = (Math.random() - 0.5) * 0.5; // -0.25到0.25弧度
        
        // 保存当前状态
        ctx.save();
        
        // 移动到位置并旋转
        ctx.translate(30 + i * 32, canvas.height / 2);
        ctx.rotate(rotate);
        
        // 绘制字符
        ctx.fillText(captchaText[i], 0, 0);
        
        // 恢复状态
        ctx.restore();
      }
    }
    
    // 验证验证码
    function validateCaptcha() {
      const userInput = captchaInput.value.trim();
      
      if (userInput === '') {
        showMessage('请输入验证码', 'red-500');
        return false;
      }
      
      if (userInput.toLowerCase() === captchaText.toLowerCase()) {
        showMessage('验证码正确，正在跳转...', 'green-500');
        
        // 1秒后跳转到目标页面
        setTimeout(() => {
          window.location.href = 'https://www.bilibili.com/';
        }, 1000);
        
        return true;
      } else {
        showMessage('验证码错误，请重新输入', 'red-500');
        // 错误时刷新验证码
        generateCaptcha();
        return false;
      }
    }
    
    // 显示提示信息
    function showMessage(text, color) {
      message.textContent = text;
      message.className = `mt-2 text-sm ${color} block`;
      
      // 3秒后自动隐藏错误信息
      if (color === 'red-500') {
        setTimeout(() => {
          message.classList.add('hidden');
        }, 3000);
      }
    }
    
    // 事件监听
    refreshBtn.addEventListener('click', generateCaptcha);
    
    submitBtn.addEventListener('click', validateCaptcha);
    
    // 支持回车键提交
    captchaInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        validateCaptcha();
      }
    });
    
    // 初始化生成验证码
    generateCaptcha();
  </script>
</body>
</html>
