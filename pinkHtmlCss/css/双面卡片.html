<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>两面翻转</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .card {
      position: relative;
      width: 1000px;
      height: 564px;
      margin: 100px auto;
      perspective: 1000px;
      border: 2px solid #000;
    }

    .card .front {
      z-index: 1;
    }

    /* 204, 128, 80 */
    .front h2 {
      color: rgb(46, 7, 112);
    }

    /* 46, 7, 112 */
    .back h2 {
      color: #c28050;
    }

    .card .front,
    .card .back {
      position: absolute;
      top: 0;
      left: 0;
      /* 隐藏反面 */
      backface-visibility: hidden;
      transition: transform 2s;
      /* 3d变换 */
      transform-style: preserve-3d;
    }

    .card .back {
      /* 背面初始为反 */
      transform: rotateY(180deg);
    }

    .card:hover .back {
      transform: rotateY(0deg);
    }

    .card:hover .front {
      /* 注意方向 */
      transform: rotateY(-180deg);
    }

    img {
      width: 100%;
    }

    h2 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate3d(-50%, -50%, 150px);
      width: 100%;
      height: 200px;
      text-align: center;
      line-height: 200px;
      font-size: 36px;
      color: #fff;
      backface-visibility: hidden;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="front">
      <img src="../../img/bg4.png" alt="">
      <h2>冬马和纱</h2>
    </div>
    <div class="back">
      <img src="../../img/bg3.png" alt="">
      <h2>小木曾雪菜</h2>
    </div>
  </div>
</body>

</html>
