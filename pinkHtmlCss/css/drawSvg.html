<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚线动画绘制？</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #fff;
    }

    svg {
      width: 500px;
      height: 500px;
    }

    svg path {
      /* 填充颜色设为透明，只显示虚线 */
      fill: none;
      /* 边框颜色设为红色 */
      stroke: pink;
      /* 边框宽度设为4px */
      stroke-width: 4;
    }

    svg:hover:not(.dick) {
      animation: draw 3s linear forwards;
    }

    .dick {
      transform: rotate(180deg);
    }

    .dick path {
      stroke: #000;
    }

    .dick:hover {
      animation: draw 1s linear forwards;
    }

    /* 虚线绘制动画 */
    @keyframes draw {
      0% {
        stroke-dasharray: 0 1000;
      }

      100% {
        stroke-dasharray: 1000 0;
      }
    }
  </style>
