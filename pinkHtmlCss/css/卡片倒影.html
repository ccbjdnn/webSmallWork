<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片倒影</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      height: 400px;
      display: flex;
      width: auto;
      justify-content: center;
      align-items: center;
      margin-top: -200px;
      gap: 10px;
    }

    .box>* {
      position: relative;
      width: 200px;
      height: 200px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      border-radius: 40px;
      overflow: hidden;
      -webkit-box-reflect: below 2px linear-gradient(transparent, rgba(0, 0, 0, 0.3));
      transition: transform .5s ease;
    }

    .box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .box .item:hover {
      transform: translateZ(100px) scale(1.2);
      z-index: 1;
    }

    /* 改变了margin有抖动bug */
    .box:hover .item:not(:hover) {
      transform: perspective(500px) scale(0.8) rotateY(45deg);
      margin: 0 -20px;
    }

    /*  鼠标经过时其他兄弟改变角度 */
    .box .item:hover~.item {
      transform: perspective(500px) scale(0.8) rotateY(-45deg);
      margin: 0 -20px;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="item"><img src="../../img/people/1.png" alt=""></div>
    <div class="item"><img src="../../img/people/2.png" alt=""></div>
    <div class="item"><img src="../../img/people/3.png" alt=""></div>
    <div class="item"><img src="../../img/people/4.png" alt=""></div>
    <div class="item"><img src="../../img/people/5.png" alt=""></div>
  </div>
</body>

</html>
