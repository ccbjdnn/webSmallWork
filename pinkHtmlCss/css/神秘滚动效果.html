<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ciallo</title>
  <link rel="stylesheet" href="./小兔鲜首页项目/css/base.css">
  <style>
    .box {
      width: 1000px;
      margin: 200px auto;
      position: relative;
      overflow: hidden;
    }

    .box::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100px;
      background-color: #fff;
      top: -50px;
      left: 0;
      border-radius: 50%;
      z-index: 1;
    }

    .box::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100px;
      background-color: #fff;
      bottom: -50px;
      left: 0;
      border-radius: 50%;
    }

    .box ul {
      display: flex;
      gap: 15px;
      overflow-x: scroll;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }

    /* 兼容webkit浏览器 */
    .box ul::-webkit-scrollbar {
      display: none;
    }

    .box ul li {
      width: 300px;
      flex: 0 0 300px;
    }

    .box ul li img {
      width: 100%;
    }

    img:hover {
      /* transform: scale(1.1); */
      z-index: 0;
      transform: translateY(-10px);
      transition: all 0.3s;
      box-shadow: 0 0 2px 2px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>

<body>
  <div class="box">
    <ul>
      <li><a href=""><img src="../../img/people/1.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/2.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/3.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/4.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/5.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/6.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/7.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/8.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/9.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/10.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/11.png" alt=""></a></li>
      <li><a href=""><img src="../../img/people/12.png" alt=""></a></li>
    </ul>
  </div>
  <script>
    const ul = document.querySelector('.box ul');
    ul.addEventListener('wheel', e => {
      // 阻止默认事件
      e.preventDefault()
      // 滚动距离
      ul.scrollLeft += e.deltaY * 2;
    })
  </script>
</body>

</html>
