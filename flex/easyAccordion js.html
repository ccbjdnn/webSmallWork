<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>usejs</title>
  <style>
    .box {
      height: 100vh;
      display: flex;
      width: 80%;
      margin: 0 auto;
    }

    .img {
      object-fit: cover;
      min-width: 0;
      flex: 1;
      border-radius: 40px;
      transition: all 1s ease;
    }

    .active {
      flex: 9;
    }
  </style>
</head>

<body>
  <div class="box">
    <img src="../img/1.jpg" alt="" class="img">
    <img src="../img/2.jpg" alt="" class="img">
    <img src="../img/3.png" alt="" class="img">
    <img src="../img/4.png" alt="" class="img">
    <img src="../img/5.png" alt="" class="img">
    <img src="../img/6.png" alt="" class="img">
  </div>
  <script>
    //事件委托触发
    document.querySelector('.box').addEventListener('mouseover', e => {
      // console.log(e.target.tagName)
      if (e.target.tagName === 'IMG') {
        document.querySelector('.active') && document.querySelector('.active').classList.remove('active')
        e.target.classList.add('active')
      }
    })
    //离开时去除active
    document.querySelector('.box').addEventListener('mouseleave', () => {
      document.querySelector('.active') && document.querySelector('.active').classList.remove('active')
    })
  </script>
</body>

</html>
