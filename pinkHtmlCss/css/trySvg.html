      align-items: center;

    svg {
      width: 500px;
      height: 500px;
    }

    /* svgcss属性 */
    svg path {
      /* 填充颜色 */
      fill: #cd5050;
      /* 边框颜色 */
      stroke: #0e1992;
      /* 边框宽度 */
      stroke-width: 10px;
      /* 边框样式 */
      stroke-linecap: round;
      stroke-linejoin: round;
      /* 边框圆角 */
      /* stroke-miterlimit: 10px; */
    }


    svg:hover {
      animation: rotate 1s linear infinite;
    }

    svg:hover path {
      fill: #000;
    }

    @keyframes rotate {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.5);
        fill: #000;
      }

      100% {
        transform: scale(1);
      }
    }
  </style>
